<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Shopping Cart | Three Brothers Shop Plus
    </title>

    <meta
        name="description"
        content="Review products added to your Three Brothers Shop Plus shopping cart.">

    <link
        rel="icon"
        href="assets/images/logo/favicon.ico">

    <link
        rel="stylesheet"
        href="assets/css/reset.css">

    <link
        rel="stylesheet"
        href="assets/css/variables.css">

    <link
        rel="stylesheet"
        href="assets/css/style.css">

    <link
        rel="stylesheet"
        href="assets/css/components.css">

    <link
        rel="stylesheet"
        href="assets/css/responsive.css">
</head>

<body>

    <a
        href="#main-content"
        class="skip-link">
        Skip to Main Content
    </a>

    <header id="main-header">

        <div class="top-bar">

            <div class="container">

                <p>
                    🚚 Free Delivery on Orders Over ৳1000
                </p>

            </div>

        </div>

        <div class="header">

            <div class="container">

                <a
                    href="index.html"
                    class="logo"
                    aria-label="Three Brothers Shop Plus Home">

                    <img
                        src="assets/images/logo/logo.webp"
                        alt="Three Brothers Shop Plus Logo"
                        width="250"
                        height="70">

                </a>

                <nav aria-label="Primary Navigation">

                    <ul>

                        <li>
                            <a href="index.html">
                                Home
                            </a>
                        </li>

                        <li>
                            <a href="products.html">
                                Products
                            </a>
                        </li>

                        <li>
                            <a
                                href="cart.html"
                                aria-current="page">
                                Cart
                            </a>
                        </li>

                    </ul>

                </nav>

                <div class="header-actions">

                    <a
                        href="cart.html"
                        class="header-icon-btn cart-header-btn"
                        aria-label="Open Shopping Cart">

                        <span aria-hidden="true">
                            🛒
                        </span>

                        <span
                            id="cart-count"
                            class="cart-count"
                            aria-live="polite">
                            0
                        </span>

                    </a>

                </div>

            </div>

        </div>

    </header>

    <main
        id="main-content"
        class="cart-page">

        <div class="container">

            <div class="section-header">

                <h1>
                    Shopping Cart
                </h1>

                <p>
                    Review your selected grocery products.
                </p>

            </div>

            <div class="cart-layout">

                <section
                    id="cart-items"
                    aria-label="Shopping Cart Items">
                </section>

                <aside
                    id="cart-summary"
                    aria-label="Order Summary">
                </aside>

            </div>

        </div>


    </main>

    <footer>

        <div class="copyright">

            <p>
                © 2026 Three Brothers Shop Plus.
                All Rights Reserved.
            </p>

        </div>

    </footer>

    <script src="assets/js/utils.js"></script>
<script src="assets/js/cart.js"></script>

</body>

</html>
