<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Compare Products | Three Brothers Shop Plus
    </title>

    <meta
        name="description"
        content="Compare products side by side at Three Brothers Shop Plus.">

    <link
        rel="icon"
        href="assets/images/logo/favicon.ico">

    <link
        rel="stylesheet"
        href="assets/css/reset.css">

    <link
        rel="stylesheet"
        href="assets/css/variables.css">

    <link
        rel="stylesheet"
        href="assets/css/style.css">

    <link
        rel="stylesheet"
        href="assets/css/components.css">

    <link
        rel="stylesheet"
        href="assets/css/responsive.css">

</head>


<body>

    <a
        href="#main-content"
        class="skip-link">

        Skip to Main Content

    </a>


    <header id="main-header">

        <div class="top-bar">

            <div class="container">

                <p>
                    🚚 Free Delivery on Orders Over ৳1000
                </p>

            </div>

        </div>


        <div class="header">

            <div class="container">

                <a
                    href="index.html"
                    class="logo"
                    aria-label="Three Brothers Shop Plus Home">

                    <img
                        src="assets/images/logo/logo.webp"
                        alt="Three Brothers Shop Plus Logo"
                        width="250"
                        height="70">

                </a>


                <nav
                    aria-label="Primary Navigation">

                    <ul>

                        <li>

                            <a href="index.html">
                                Home
                            </a>

                        </li>

                        <li>

                            <a href="products.html">
                                Products
                            </a>

                        </li>

                        <li>

                            <a
                                href="compare.html"
                                aria-current="page">

                                Compare

                            </a>

                        </li>

                        <li>

                            <a href="cart.html">
                                Cart
                            </a>

                        </li>

                    </ul>

                </nav>


                <div class="header-actions">

                    <a
                        href="compare.html"
                        class="header-icon-btn compare-header-btn"
                        aria-label="Compare Products">

                        <span aria-hidden="true">
                            ⚖️
                        </span>

                        <span
                            id="compare-count"
                            class="compare-count"
                            aria-live="polite">

                            0

                        </span>

                    </a>


                    <a
                        href="cart.html"
                        class="header-icon-btn cart-header-btn"
                        aria-label="Open Shopping Cart">

                        <span aria-hidden="true">
                            🛒
                        </span>

                        <span
                            id="cart-count"
                            class="cart-count"
                            aria-live="polite">

                            0

                        </span>

                    </a>

                </div>

            </div>

        </div>

    </header>


    <main
        id="main-content"
        class="compare-page">

        <div class="container">

            <div class="section-header">

                <h1>
                    Compare Products
                </h1>

                <p>
                    Compare selected products side by side
                    and choose the best option for you.
                </p>

            </div>


            <div
                id="compare-toolbar"
                class="compare-toolbar">

                <p
                    id="compare-status"
                    aria-live="polite">

                    Loading comparison...

                </p>


                <button
                    type="button"
                    id="clear-compare-button"
                    class="btn btn-outline">

                    Clear All

                </button>

            </div>


            <section
                id="compare-content"
                aria-label="Product Comparison"
                aria-live="polite">

            </section>

        </div>

    </main>


    <footer>

        <div class="copyright">

            <p>
                © 2026 Three Brothers Shop Plus.
                All Rights Reserved.
            </p>

        </div>

    </footer>


    <script src="assets/js/utils.js"></script>

    <script src="assets/js/products.js"></script>

    <script src="assets/js/compare.js"></script>

</body>

</html>
