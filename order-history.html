<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Order History | Three Brothers Shop Plus
    </title>

    <meta
        name="description"
        content="View your previous orders from Three Brothers Shop Plus.">

    <link
        rel="icon"
        href="assets/images/logo/favicon.ico">

    <link
        rel="stylesheet"
        href="assets/css/reset.css">

    <link
        rel="stylesheet"
        href="assets/css/variables.css">

    <link
        rel="stylesheet"
        href="assets/css/style.css">

    <link
        rel="stylesheet"
        href="assets/css/components.css">

    <link
        rel="stylesheet"
        href="assets/css/responsive.css">
</head>

<body>

    <header id="main-header">

        <div class="top-bar">

            <div class="container">

                <p>
                    📦 View Your Previous Orders
                </p>

            </div>

        </div>

        <div class="header">

            <div class="container">

                <a
                    href="index.html"
                    class="logo"
                    aria-label="Three Brothers Shop Plus Home">

                    <img
                        src="assets/images/logo/logo.webp"
                        alt="Three Brothers Shop Plus Logo"
                        width="150"
                        height="52">

                </a>

                <nav aria-label="Primary Navigation">

                    <ul>

                        <li>
                            <a href="index.html">
                                Home
                            </a>
                        </li>

                        <li>
                            <a href="products.html">
                                Products
                            </a>
                        </li>

                        <li>
                            <a href="wishlist.html">
                                Wishlist
                            </a>
                        </li>

                        <li>
                            <a href="cart.html">
                                Cart
                            </a>
                        </li>

                        <li>
                            <a
                                href="order-history.html"
                                aria-current="page">
                                Orders
                            </a>
                        </li>

                    </ul>

                </nav>

            </div>

        </div>

    </header>

    <main
        id="main-content"
        class="order-history-page">

        <div class="container">

            <div class="section-header">

                <h1>
                    Order History
                </h1>

                <p>
                    Review your previous orders.
                </p>

            </div>

            <section
                id="order-history-list"
                class="order-history-list"
                aria-live="polite">
            </section>

            <section
    class="order-history-controls"
    aria-label="Order History Filters">

    <div class="order-search-group">

        <label
            for="order-search"
            class="order-control-label">

            Search Orders

        </label>

        <div class="order-search-wrapper">

            <span
                class="order-search-icon"
                aria-hidden="true">

                🔍

            </span>

            <input
                type="search"
                id="order-search"
                class="order-search-input"
                placeholder="Search by Order ID..."
                autocomplete="off">

        </div>

    </div>


    <div class="order-filter-group">

        <label
            for="order-status-filter"
            class="order-control-label">

            Status

        </label>

        <select
            id="order-status-filter"
            class="order-filter-select">

            <option value="all">
                All Statuses
            </option>

            <option value="pending">
                Pending
            </option>

            <option value="confirmed">
                Confirmed
            </option>

            <option value="processing">
                Processing
            </option>

            <option value="shipped">
                Shipped
            </option>

            <option value="delivered">
                Delivered
            </option>

            <option value="cancelled">
                Cancelled
            </option>

        </select>

    </div>


    <div class="order-sort-group">

        <label
            for="order-sort"
            class="order-control-label">

            Sort By

        </label>

        <select
            id="order-sort"
            class="order-filter-select">

            <option value="newest">
                Newest First
            </option>

            <option value="oldest">
                Oldest First
            </option>

            <option value="highest">
                Highest Total
            </option>

            <option value="lowest">
                Lowest Total
            </option>

        </select>

    </div>


    <div class="order-reset-group">

        <button
            type="button"
            id="reset-order-filters"
            class="btn btn-outline order-reset-btn">

            Reset

        </button>

    </div>

</section>


<div class="order-results-bar">

    <p
        id="order-results-count"
        aria-live="polite">

        Loading orders...

    </p>

</div>

        </div>

    </main>

    <footer>

        <div class="copyright">

            <p>
                © 2026 Three Brothers Shop Plus.
                All Rights Reserved.
            </p>

        </div>

    </footer>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/order-history.js"></script>

</body>

</html>
